name: Publish to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@nightly

      - name: Publish karpal-core (already published, skip if exists)
        continue-on-error: true
        run: cargo publish -p karpal-core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-topos (NEW in 0.8.0)
        run: cargo publish -p karpal-topos
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-algebra (already published, skip if exists)
        continue-on-error: true
        run: cargo publish -p karpal-algebra
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-profunctor (already published, skip if exists)
        continue-on-error: true
        run: cargo publish -p karpal-profunctor
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-arrow (already published, skip if exists)
        continue-on-error: true
        run: cargo publish -p karpal-arrow
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-free (already published, skip if exists)
        continue-on-error: true
        run: cargo publish -p karpal-free
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-effect (already published, skip if exists)
        continue-on-error: true
        run: cargo publish -p karpal-effect
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-optics (already published, skip if exists)
        continue-on-error: true
        run: cargo publish -p karpal-optics
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-recursion (already published, skip if exists)
        continue-on-error: true
        run: cargo publish -p karpal-recursion
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-proof-derive (already published, skip if exists)
        continue-on-error: true
        run: cargo publish -p karpal-proof-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-proof (already published, skip if exists)
        continue-on-error: true
        run: cargo publish -p karpal-proof
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-verify-derive (already published, skip if exists)
        continue-on-error: true
        run: cargo publish -p karpal-verify-derive
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-verify (already published, skip if exists)
        continue-on-error: true
        run: cargo publish -p karpal-verify
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-diagram (already published, skip if exists)
        continue-on-error: true
        run: cargo publish -p karpal-diagram
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-schubert-types (already published, skip if exists)
        continue-on-error: true
        run: cargo publish -p karpal-schubert-types
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-higher
        run: cargo publish -p karpal-higher
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-schubert-types
        run: cargo publish -p karpal-schubert-types
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish karpal-std
        run: cargo publish -p karpal-std
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Trigger Netlify docs deploy
        run: curl -s -X POST "${{ secrets.NETLIFY_BUILD_HOOK }}"
