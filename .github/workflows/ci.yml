name: CI

on:
  push:
  pull_request:
    branches: [develop, main]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt, clippy

      - name: cargo fmt --check --all
        run: cargo fmt --check --all

      - name: cargo clippy --workspace
        run: cargo clippy --workspace -- -D warnings

      - name: cargo test --workspace
        run: cargo test --workspace

      - name: no_std check (karpal-core)
        run: cargo build --no-default-features -p karpal-core

      - name: no_std check (karpal-profunctor)
        run: cargo build --no-default-features -p karpal-profunctor

      - name: no_std check (karpal-arrow)
        run: cargo build --no-default-features -p karpal-arrow

      - name: no_std check (karpal-free)
        run: cargo build --no-default-features -p karpal-free

      - name: no_std check (karpal-recursion)
        run: cargo build --no-default-features -p karpal-recursion

      - name: no_std check (karpal-algebra)
        run: cargo build --no-default-features -p karpal-algebra

      - name: no_std check (karpal-effect)
        run: cargo build --no-default-features -p karpal-effect

      - name: no_std check (karpal-proof)
        run: cargo build --no-default-features -p karpal-proof
